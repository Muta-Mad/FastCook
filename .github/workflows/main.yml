name: FastCook CI/CD

on:
  push:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ./backend/requirements.txt

      - name: Lint with ruff
        run: python -m ruff check --select E9,F63,F7,F82 backend/

      - name: Run pytest
        env:
          DB__URL: "postgresql+asyncpg://user:pass@localhost:5432/fastcook"
          ACCESS_TOKEN__VERIFICATION_TOKEN_SECRET: "ci-test-secret-key-not-for-production"
          ACCESS_TOKEN__RESET_PASSWORD_TOKEN_SECRET: "ci-test-secret-key-not-for-production"
        run: |
          cd backend
          python -m pytest tests/ -v --cov=. --cov-report=term-missing --cov-fail-under=80

  build_and_push_backend:
    name: Push backend Docker image to DockerHub
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Check out the repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push backend to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./backend/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fastcook_backend:latest

  build_and_push_frontend:
    name: Push frontend Docker image to DockerHub
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Check out the repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push frontend to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./frontend/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fastcook_frontend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/fastcook_frontend:cache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/fastcook_frontend:cache,mode=max

  build_and_push_nginx:
    name: Push nginx Docker image to DockerHub
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Check out the repo
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push nginx to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./infra/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fastcook_nginx:latest

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build_and_push_backend
      - build_and_push_frontend
      - build_and_push_nginx
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Copy docker-compose.production.yml via scp
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.production.yml"
          target: "fastcook"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: DOCKER_USERNAME
          script: |
            cd fastcook
            export DOCKER_USERNAME=$DOCKER_USERNAME
            ~/bin/docker-compose -f docker-compose.production.yml pull
            ~/bin/docker-compose -f docker-compose.production.yml down
            ~/bin/docker-compose -f docker-compose.production.yml up -d
            ~/bin/docker-compose -f docker-compose.production.yml exec -T backend alembic upgrade head
